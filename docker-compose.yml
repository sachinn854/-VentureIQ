version: "3.9"

# ── Production / local Docker test ────────────────────────────────────────────
# Builds a single image: React frontend compiled into FastAPI static files.
# Usage:
#   docker-compose up --build
#   Open http://localhost:8000

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - PYTHONPATH=/app
